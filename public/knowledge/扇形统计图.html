<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>扇形统计图</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; line-height: 1.6; }
        .card { background: #fff3e0; padding: 15px; border-radius: 10px; border-left: 5px solid #ff9800; }
        h1 { color: #ff9800; }
    </style>
</head>
<body>
    <h1>扇形统计图</h1>
    <div class="card">
        <p>扇形统计图用整个圆表示<strong>总数</strong>，用圆内各个扇形的大小表示各部分数量占总数的<strong>百分比</strong>。</p>
    </div>
    <h2>特点</h2>
    <ul>
        <li>直观显示各部分与总量的关系。</li>
        <li>扇形越大，占总数的百分比越高。</li>
    </ul>
    <p>例如：班级同学喜欢的运动统计，足球30%，篮球40%，跑步30%。</p>
</body>
</html>
