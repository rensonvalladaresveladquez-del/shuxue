<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>1-5的认识</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; line-height: 1.6; }
        .card { background: #f9f9f9; padding: 15px; border-radius: 10px; border-left: 5px solid #4caf50; }
        h1 { color: #4caf50; }
    </style>
</head>
<body>
    <h1>1-5的认识</h1>
    <div class="card">
        <p>这是小学一年级数学最基础的内容。</p>
        <ul>
            <li><strong>1</strong>: 像铅笔细又长。</li>
            <li><strong>2</strong>: 像小鸭水上漂。</li>
            <li><strong>3</strong>: 像耳朵听声音。</li>
            <li><strong>4</strong>: 像旗帜迎风展。</li>
            <li><strong>5</strong>: 像钩子挂东西。</li>
        </ul>
    </div>
    <p>快去数一数你身边的物品吧！比如：1个书包，2本书...</p>
</body>
</html>
