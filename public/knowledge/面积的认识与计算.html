<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>面积的认识与计算</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; line-height: 1.6; }
        .card { background: #e3f2fd; padding: 15px; border-radius: 10px; border-left: 5px solid #2196f3; }
        h1 { color: #2196f3; }
        .formula { font-weight: bold; font-family: monospace; font-size: 1.2em; background: #eee; padding: 2px 5px; }
    </style>
</head>
<body>
    <h1>面积的认识与计算</h1>
    <div class="card">
        <p>物体的表面或封闭图形的大小，就是它们的<strong>面积</strong>。</p>
        <p>常用单位：平方厘米 (cm²), 平方分米 (dm²), 平方米 (m²)。</p>
    </div>
    <h2>计算公式</h2>
    <ul>
        <li>长方形面积 = <span class="formula">长 × 宽</span></li>
        <li>正方形面积 = <span class="formula">边长 × 边长</span></li>
    </ul>
    <p>举例：一个长5厘米，宽3厘米的长方形，面积是 5 × 3 = 15 平方厘米。</p>
</body>
</html>
